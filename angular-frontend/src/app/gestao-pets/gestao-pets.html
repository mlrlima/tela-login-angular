<div class="page">

  <mat-card>

    <div class="header">

      <h2>🐾 Gestão de Pets</h2>

      <button
        mat-raised-button
        color="primary"
        routerLink="/pets/novo">

        <mat-icon>add</mat-icon>
        Novo Pet

      </button>

    </div>

    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Pesquisar</mat-label>
      <input
        matInput
        [(ngModel)]="termoBusca"
        (ngModelChange)="buscarPets()"
        placeholder="Nome, espécie ou dono...">
      <mat-icon matPrefix>search</mat-icon>
      <button
        *ngIf="termoBusca"
        mat-icon-button
        matSuffix
        (click)="termoBusca=''; buscarPets()">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <div *ngIf="mensagens" class="error">
      {{ mensagens }}
    </div>

    <div *ngIf="carregando" class="loading">

      <mat-spinner diameter="45"></mat-spinner>

    </div>

    <table *ngIf="!carregando && petsBuscados.length > 0"
           class="mat-elevation-z2">

      <thead>
        <tr>
          <th>Nome</th>
          <th>Espécie</th>
          <th>Dono</th>
          <th style="width:170px;">Ações</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let pet of petsBuscados">

          <td>{{ pet.nome }}</td>

          <td>{{ pet.especie }}</td>

          <td>{{ pet.dono?.email ?? '-' }}</td>

          <td class="actions">

            <button
              mat-icon-button
              color="primary"
              [routerLink]="['/pets', pet.id]">

              <mat-icon>edit</mat-icon>

            </button>

            <button
              mat-icon-button
              color="warn"
              (click)="remover(pet.id)">

              <mat-icon>delete</mat-icon>

            </button>

          </td>

        </tr>

      </tbody>

    </table>

    <div
      *ngIf="!carregando && petsBuscados.length === 0"
      class="empty-state">

      <mat-icon class="empty-icon">pets</mat-icon>

      <h3>{{ termoBusca ? 'Nenhum pet encontrado' : 'Nenhum pet cadastrado' }}</h3>

      <p *ngIf="!termoBusca">Clique em <strong>Novo Pet</strong> para começar.</p>
      <p *ngIf="termoBusca">Tente outro termo de busca.</p>

    </div>

  </mat-card>

</div>
