<div class="auth-card">
  <h2>Entrar</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="Email" required />
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input id="senha" type="password" name="senha" [(ngModel)]="senha" placeholder="Senha" required />
    </div>

    <p *ngIf="mensagens" class="mensagem">{{ mensagens }}</p>

    <button type="submit" [disabled]="carregando">
      {{ carregando ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>

  <p class="switch-link">
   <a routerLink="/criar-usuario">Criar novo usuário</a>
  </p>
</div>
