<div class="page">

  <mat-card>

    <h2>
      {{ modoEdicao ? '✏️ Editar Empresa' : 'Nova Empresa' }}
    </h2>

    <div *ngIf="carregando" class="loading">
      <mat-spinner diameter="45"></mat-spinner>
    </div>

    <form *ngIf="!carregando" (ngSubmit)="onSubmit()"
    		(keydown.enter)="$event.preventDefault(); onSubmit()">

<mat-form-field appearance="outline">

  <mat-label>Nome</mat-label>

  <input
    matInput
    id="nome"
    name="nome"
    [(ngModel)]="empresa.nome"
    required>

</mat-form-field>

<div class="usuarios-section">

  <h3>Usuários relacionados</h3>

  <div class="add-usuario">

    <mat-form-field appearance="outline" class="email-field">
      <mat-label>E-mail do usuário</mat-label>
      <input
        matInput
        [(ngModel)]="novoEmail"
        name="novoEmail"
        (keydown.enter)="$event.preventDefault(); adicionarUsuario()"
        placeholder="usuario@email.com">
    </mat-form-field>

    <button
      mat-icon-button
      color="primary"
      type="button"
      (click)="adicionarUsuario()">
      <mat-icon>add_circle</mat-icon>
    </button>

  </div>

  <div *ngIf="erroUsuario" class="error">
    {{ erroUsuario }}
  </div>

  <mat-chip-set aria-label="Usuários relacionados">
    <mat-chip
      *ngFor="let usuario of empresa.usuarios"
      (removed)="removerUsuario(usuario.id)">
      {{ usuario.email }}
      <button matChipRemove>
        <mat-icon>cancel</mat-icon>
      </button>
    </mat-chip>
  </mat-chip-set>

  <p *ngIf="!empresa.usuarios?.length" class="empty-usuarios">
    Nenhum usuário vinculado ainda.
  </p>

</div>

      <div
        *ngIf="mensagens"
        class="error">

        {{ mensagens }}

      </div>

      <div class="actions">

        <button
          mat-raised-button
          color="primary"
          type="submit">

          <mat-icon>save</mat-icon>

          Salvar

        </button>

        <button
          mat-stroked-button
          routerLink="/empresas"
          type="button">

          <mat-icon>arrow_back</mat-icon>

          Voltar

        </button>

      </div>

    </form>

  </mat-card>

</div>
