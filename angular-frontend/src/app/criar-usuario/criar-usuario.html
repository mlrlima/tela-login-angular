<div class="login-container">

  <mat-card class="login-card">

    <h2>Criar conta</h2>

    <form (ngSubmit)="onSubmit()">

      <mat-form-field appearance="outline">
        <mat-label>Nome</mat-label>
        <input
          matInput
          [(ngModel)]="nome"
          name="nome"
          required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          [(ngModel)]="email"
          name="email"
          required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Senha</mat-label>
        <input
          matInput
          type="password"
          [(ngModel)]="senha"
          name="senha"
          required>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="full-width">

        Criar conta

      </button>

    </form>

    <p
      *ngIf="mensagens">

      {{ mensagens }}

    </p>

    <div class="switch-link">

      Já possui uma conta?

      <a routerLink="/login">

        Entrar

      </a>

    </div>

  </mat-card>

</div>
