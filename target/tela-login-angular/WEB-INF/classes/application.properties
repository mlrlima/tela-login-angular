# Configuracao principal do Spring Boot

# ============================================================
# CONFIGURACOES DO SERVIDOR
# ============================================================

# Porta onde a aplicacao vai rodar (padrao 8080)
server.port=8080

# ============================================================
# CONFIGURACOES DO BANCO DE DADOS (Datasource)
# ============================================================

# URL do MySQL - banco 'tela-login-angular'
spring.datasource.url=jdbc:mysql://localhost:3306/tela-login-angular
spring.datasource.username=root
spring.datasource.password=

# ============================================================
# CONFIGURACOES DO JPA / HIBERNATE
# ============================================================

# create -> RECRIA as tabelas ao iniciar
# Opcoes: validate | update | create | create-drop | none
spring.jpa.hibernate.ddl-auto=create

# Exibe as queries SQL no console
spring.jpa.show-sql=true

# Formata as queries SQL com indentacao (mais legivel)
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# CONFIGURACOES DE INICIALIZACAO DO BANCO (SQL)
# ============================================================

# Sempre executa os scripts SQL de inicializacao
# (schema.sql e data.sql na raiz do classpath)
spring.sql.init.mode=always

# Aguarda o Hibernate criar as tabelas ANTES de executar
# os scripts data.sql (evita erro de tabela nao existir)
spring.jpa.defer-datasource-initialization=true

# ============================================================
# LOG - NIVEL DE RASTREAMENTO PARA MAPEAMENTO DE REQUISICOES
# ============================================================

# Nivel TRACE -> mostra TODOS os endpoints mapeados
# Para debug de rotas e verificar se os
# controllers foram registrados corretamente
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE